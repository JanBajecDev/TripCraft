version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tripcraft
      POSTGRES_USER: tripcraft
      POSTGRES_PASSWORD: tripcraft_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripcraft"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
